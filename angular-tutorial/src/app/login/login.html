<h2>Login Component - Property Binding</h2>

<!-- Property Binding -->
<input type="text" [value]="username" />

<!-- Image Binding -->
<img [src]="profileImage" alt="Profile Image" width="150" />

<br /><br />

<!-- Button Disabled Binding -->
<button [disabled]="isDisabled">Login</button>

<button (click)="toggleButton()">Toggle Disable</button>

<br /><br />
 
<!-- Class Binding -->
<p [class.error]="isError">This is a message</p>

<button (click)="toggleError()">Toggle Error Style</button>

<!-- Style Binding -->
<p [style.color]="isError ? 'red' : 'green'">
  Dynamic Text Color
</p>
